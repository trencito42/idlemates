version: '3.9'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: idlemates
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    environment:
      DATABASE_URL: mysql://root:root@db:3306/idlemates
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3005
      NEXTAUTH_SECRET: changeme
      ENCRYPTION_MASTER_KEY: c3VwZXItc2VjcmV0LXN1cGVyLXNlY3JldC1tYXN0ZXItbWFzdGVy
      SITE_URL: http://localhost:3005
    ports:
      - "3005:3005"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: npm run worker
    environment:
      DATABASE_URL: mysql://root:root@db:3306/idlemates
      REDIS_URL: redis://redis:6379
      ENCRYPTION_MASTER_KEY: c3VwZXItc2VjcmV0LXN1cGVyLXNlY3JldC1tYXN0ZXItbWFzdGVy
    depends_on:
      - db
      - redis

volumes:
  db_data:
